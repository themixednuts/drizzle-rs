[workspace]
# Release control
publish = true
release = true
# Pre-1.0 policy: every release is a patch bump unless a commit explicitly
# uses `feat!:` / `BREAKING CHANGE:`.
#
# `features_always_increment_minor` defaults to `false`, which means `feat:`
# bumps PATCH in 0.x and only starts bumping MINOR once we hit 1.0 — exactly
# what we want. Listing it here makes the policy explicit.
features_always_increment_minor = false
# Don't let cargo-semver-checks escalate the bump when it spots an API change.
# The developer decides when 0.x.y rolls to 0.(x+1).0, not the tool.
semver_check = false
allow_dirty = false

# Git and tagging
git_tag_enable = false
git_release_enable = false  # release.yml handles GitHub releases with CLI binaries

# Changelog settings
changelog_update = true
changelog_path = "CHANGELOG.md"

# PR settings
pr_labels = ["release"]

# Conventional commits configuration
[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Package-specific overrides
[[package]]
name = "drizzle"
changelog_update = true
git_tag_enable = true
git_tag_name = "v{{ version }}"
changelog_include = [
  "drizzle-core",
  "drizzle-macros",
  "drizzle-sqlite",
  "drizzle-postgres",
  "drizzle-mysql",
  "drizzle-migrations",
  "drizzle-types",
  "drizzle-seed",
  "drizzle-cli",
]

[[package]]
name = "drizzle-types"
changelog_update = false

[[package]]
name = "drizzle-migrations"
changelog_update = false

[[package]]
name = "drizzle-core"
changelog_update = false

[[package]]
name = "drizzle-macros"
changelog_update = false

[[package]]
name = "drizzle-sqlite"
changelog_update = false

[[package]]
name = "drizzle-postgres"
changelog_update = false

[[package]]
name = "drizzle-mysql"
changelog_update = false
# MySQL driver is WIP — keep it out of crates.io for now.
publish = false
release = false

[[package]]
name = "drizzle-seed"
changelog_update = false

[[package]]
name = "drizzle-cli"
changelog_update = false
