name = "drizzle-bench"
account_id = "8ce8bd9cb4d667a578aee91aa8dc5edd"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"
assets = { directory = ".svelte-kit/cloudflare", binding = "ASSETS" }

[[r2_buckets]]
binding = "BENCH_DATA"
bucket_name = "drizzle-bench"

# ISR caching layer
[[kv_namespaces]]
binding = "ISR_CACHE"
id = "c9767b93da2a4b3c80956215ba53548f"

[durable_objects]
bindings = [
  { name = "TAG_INDEX", class_name = "ISRTagIndexDO", script_name = "drizzle-bench-isr" }
]
