name: Publish

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Needed for the "Trigger binary release" step to dispatch release.yml.
  # Tags created by release-plz are pushed using GITHUB_TOKEN, and pushes
  # made with that token do NOT trigger tag-push workflows. We work around
  # this by explicitly dispatching release.yml after publishing.
  actions: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release') &&
        github.event.pull_request.user.login == 'github-actions[bot]'
      )
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CI passed on the release PR
        # Belt-and-suspenders: even if branch protection isn't enforced
        # locally, refuse to publish unless the PR's head commit has a green
        # CI run. workflow_dispatch is exempt — that path is an explicit
        # human override.
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Verifying CI on PR #$PR_NUMBER (head: $PR_HEAD)..."

          # gh pr checks output is empty when there are no checks at all
          # (e.g. CI was skipped entirely, or the PR was opened before
          # ci.yml was set up). Treat that as a failure — we want positive
          # confirmation that lint/build/test ran and passed.
          CHECKS_OUTPUT=$(gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" 2>&1 || true)
          if [[ -z "$CHECKS_OUTPUT" ]] || echo "$CHECKS_OUTPUT" | grep -q "no checks reported"; then
            echo "::error::PR #$PR_NUMBER has no CI checks reported. Refusing to publish."
            echo "::error::Push a fresh commit to the PR to trigger CI."
            exit 1
          fi

          # gh pr checks exit codes:
          #   0  all required checks succeeded
          #   1  one or more failed
          #   8  required checks still pending / in progress
          if gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}"; then
            echo "$CHECKS_OUTPUT"
            echo "All CI checks passed on PR #$PR_NUMBER"
          else
            EXIT=$?
            echo "$CHECKS_OUTPUT"
            echo "::error::CI on PR #$PR_NUMBER is not green (gh pr checks exited $EXIT). Refusing to publish."
            echo "::error::If this is a stale skip from before the ci.yml fix, push a fresh commit to the PR to re-trigger CI."
            exit 1
          fi

      - name: Get Rust version
        id: rust-version
        run: |
          RUST_VERSION=$(grep '^rust-version = ' Cargo.toml | sed 's/rust-version = "\(.*\)"/\1/')
          echo "version=$RUST_VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      - name: Capture pre-release tag
        id: pre
        run: |
          PRE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          echo "tag=$PRE_TAG" >> $GITHUB_OUTPUT
          echo "Pre-release latest tag: $PRE_TAG"

      - name: Run release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          release-plz release --git-token "$GITHUB_TOKEN" || {
            echo "::error::release-plz release failed - some crates may have been partially published"
            exit 1
          }

      - name: Trigger binary release
        # Tag pushes by GITHUB_TOKEN don't trigger workflows, so dispatch
        # release.yml explicitly. workflow_dispatch IS one of the two events
        # that DOES fire when triggered by GITHUB_TOKEN.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch tags release-plz just pushed
          git fetch --tags --force
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          echo "Post-release latest tag: $NEW_TAG"
          if [[ "$NEW_TAG" == "${{ steps.pre.outputs.tag }}" ]]; then
            echo "No new tag created — skipping binary release."
            exit 0
          fi
          if [[ "$NEW_TAG" != v[0-9]* ]]; then
            echo "Latest tag '$NEW_TAG' is not a versioned release — skipping."
            exit 0
          fi
          echo "Dispatching release.yml for $NEW_TAG"
          gh workflow run release.yml --ref "$NEW_TAG"

      - name: Summary
        run: echo "Successfully published crates to crates.io" >> $GITHUB_STEP_SUMMARY
