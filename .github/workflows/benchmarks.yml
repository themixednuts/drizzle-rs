name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark-sqlite:
    name: Benchmark SQLite (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            features: "rusqlite,turso,libsql,uuid"
          - os: windows-latest
            platform: windows
            features: "rusqlite,turso,libsql,uuid"
          - os: macos-latest
            platform: macos
            features: "rusqlite,turso,libsql,uuid"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-sqlite-${{ matrix.platform }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Fix cargo registry permissions (libsql-sqlite3-parser workaround)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # libsql-sqlite3-parser build.rs uses MSVC's deprecated -o flag;
          # MSVC ignores it and writes lemon.obj next to the .c source in
          # the read-only cargo registry. Fetch first, then make writable.
          cargo fetch
          chmod -R u+w "${CARGO_HOME:-$USERPROFILE/.cargo}/registry/src" 2>/dev/null || true

      - name: Restore Criterion baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: criterion-sqlite-${{ matrix.platform }}-main-
          restore-keys: |
            criterion-sqlite-${{ matrix.platform }}-main-

      - name: Run SQLite benchmarks (save baseline on main)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          cargo bench --bench sqlite --features "${{ matrix.features }}" -- \
            --save-baseline main \
            --output-format bencher \
            --color never | tee bench_output.txt

      - name: Run SQLite benchmarks (compare on PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          cargo bench --bench sqlite --features "${{ matrix.features }}" -- \
            --baseline-lenient main \
            --output-format bencher \
            --color never | tee bench_output.txt

      - name: Create report
        shell: bash
        run: |
          {
            echo "# SQLite Benchmarks"
            echo ""
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Platform:** ${{ runner.os }} (${{ runner.arch }})"
            echo "**Mode:** ${{ github.event_name == 'pull_request' && 'baseline compare' || 'baseline save' }}"
            echo ""
            echo '```'
            cat bench_output.txt
            echo '```'
          } > sqlite-${{ matrix.platform }}.md

      - name: Upload text report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-sqlite-${{ matrix.platform }}
          path: sqlite-${{ matrix.platform }}.md
          retention-days: 30

      - name: Upload Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-sqlite-${{ matrix.platform }}
          path: target/criterion
          retention-days: 14

      - name: Save Criterion baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-sqlite-${{ matrix.platform }}-main-${{ github.sha }}

  benchmark-postgres:
    name: Benchmark PostgreSQL (linux)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drizzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-postgres
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Restore Criterion baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: criterion-postgres-main-
          restore-keys: |
            criterion-postgres-main-

      - name: Run PostgreSQL sync benchmarks (save baseline on main)
        if: github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=drizzle_test"
        shell: bash
        run: |
          cargo bench --bench postgres --features "postgres-sync,uuid" -- \
            --save-baseline sync-main \
            --output-format bencher \
            --color never | tee sync_output.txt

      - name: Run PostgreSQL tokio benchmarks (save baseline on main)
        if: github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=drizzle_test"
        shell: bash
        run: |
          cargo bench --bench postgres --features "tokio-postgres,uuid" -- \
            --save-baseline tokio-main \
            --output-format bencher \
            --color never | tee tokio_output.txt

      - name: Run PostgreSQL sync benchmarks (compare on PR)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=drizzle_test"
        shell: bash
        run: |
          cargo bench --bench postgres --features "postgres-sync,uuid" -- \
            --baseline-lenient sync-main \
            --output-format bencher \
            --color never | tee sync_output.txt

      - name: Run PostgreSQL tokio benchmarks (compare on PR)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: "host=localhost user=postgres password=postgres dbname=drizzle_test"
        shell: bash
        run: |
          cargo bench --bench postgres --features "tokio-postgres,uuid" -- \
            --baseline-lenient tokio-main \
            --output-format bencher \
            --color never | tee tokio_output.txt

      - name: Create report
        shell: bash
        run: |
          {
            echo "# PostgreSQL Benchmarks"
            echo ""
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Platform:** ${{ runner.os }} (${{ runner.arch }})"
            echo "**Mode:** ${{ github.event_name == 'pull_request' && 'baseline compare' || 'baseline save' }}"
            echo ""
            echo "## sync"
            echo ""
            echo '```'
            cat sync_output.txt
            echo '```'
            echo ""
            echo "## tokio"
            echo ""
            echo '```'
            cat tokio_output.txt
            echo '```'
          } > postgres-linux.md

      - name: Upload text report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-postgres-linux
          path: postgres-linux.md
          retention-days: 30

      - name: Upload Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-postgres-linux
          path: target/criterion
          retention-days: 14

      - name: Save Criterion baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-postgres-main-${{ github.sha }}
