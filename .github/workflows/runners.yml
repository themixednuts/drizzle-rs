name: Runners

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  schedule:
    - cron: '0 4 * * 1'  # weekly Monday 04:00 UTC
  workflow_dispatch:
    inputs:
      benchmark_size:
        description: Benchmark workload to run
        required: false
        type: choice
        options:
          - full
          - preview
        default: full
      publish_to_r2:
        description: Publish manual main runs to Cloudflare R2
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95"
  NODE_VERSION: "24"
  BENCHMARK_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_size || (github.event_name == 'pull_request' && 'preview' || 'full') }}
  BENCH_COHORT_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}-throughput-http
  PUBLISH_TO_R2: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.publish_to_r2 && github.ref == 'refs/heads/main') }}
  R2_BUCKET: drizzle-bench

jobs:
  sqlite:
    name: SQLite (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            sqlite_features: "rusqlite,turso,uuid"
          - os: windows-latest
            platform: windows
            sqlite_features: "rusqlite,uuid"
          - os: macos-latest
            platform: macos
            sqlite_features: "rusqlite,turso,uuid"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: runner-sqlite-${{ matrix.platform }}
          save-if: ${{ env.PUBLISH_TO_R2 == 'true' }}

      - name: Restore runner baseline
        if: ${{ !env.ACT }}
        uses: actions/cache/restore@v5
        with:
          path: bench-out/sqlite-${{ matrix.platform }}/runs
          key: runner-baseline-sqlite-${{ matrix.platform }}-
          restore-keys: |
            runner-baseline-sqlite-${{ matrix.platform }}-

      - name: Run contract runner
        id: runner
        shell: bash
        run: |
          class="full"
          workload="bench/spec/workload.throughput.v1.json"
          if [[ "${BENCHMARK_SIZE}" == "preview" && "${PUBLISH_TO_R2}" != "true" ]]; then
            class="small"
            workload="bench/spec/workload.preview.v1.json"
          elif [[ "${PUBLISH_TO_R2}" == "true" ]]; then
            class="publish"
          fi

          out="bench-out/sqlite-${{ matrix.platform }}"
          mkdir -p "$out"

          cargo run --release -p bench-runner -- run \
            --suite throughput-http \
            --workload "$workload" \
            --targets bench/spec/targets.sqlite.v1.json \
            --requests bench/spec/requests.empty.v1.json \
            --out "$out" \
            --cohort-id "$BENCH_COHORT_ID" \
            --class "$class" \
            --baseline auto \
            --json | tee runner_output.txt

          run_id="$(grep '^run_id=' runner_output.txt | tail -n1 | cut -d= -f2)"
          if [[ -z "$run_id" ]]; then
            echo "run_id was not emitted"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Validate runner artifacts
        shell: bash
        run: |
          workload="bench/spec/workload.throughput.v1.json"
          if [[ "${BENCHMARK_SIZE}" == "preview" && "${PUBLISH_TO_R2}" != "true" ]]; then
            workload="bench/spec/workload.preview.v1.json"
          fi
          cargo run -q -p bench-runner -- validate \
            --run "bench-out/sqlite-${{ matrix.platform }}/runs/${{ steps.runner.outputs.run_id }}" \
            --workload "$workload" \
            --targets bench/spec/targets.sqlite.v1.json

      - name: Upload runner artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: runner-sqlite-${{ matrix.platform }}
          path: |
            bench-out/sqlite-${{ matrix.platform }}/runs/${{ steps.runner.outputs.run_id }}
            runner_output.txt
          retention-days: 30

      - name: Save runner baseline
        if: ${{ env.PUBLISH_TO_R2 == 'true' && !env.ACT }}
        uses: actions/cache/save@v5
        with:
          path: bench-out/sqlite-${{ matrix.platform }}/runs/${{ steps.runner.outputs.run_id }}
          key: runner-baseline-sqlite-${{ matrix.platform }}-${{ github.sha }}

  postgres:
    name: PostgreSQL (linux)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drizzle_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: runner-postgres
          save-if: ${{ env.PUBLISH_TO_R2 == 'true' }}

      - name: Resolve DATABASE_URL
        id: pgurl
        shell: bash
        run: |
          pg_host="localhost"
          pg_port="${{ job.services.postgres.ports[5432] }}"
          if [[ -n "${ACT:-}" ]]; then
            pg_host="127.0.0.1"
            pg_id="${{ job.services.postgres.id }}"
            if [[ -z "$pg_id" ]] && command -v docker >/dev/null 2>&1; then
              pg_id="$(
                docker ps --format '{{.ID}} {{.Names}} {{.Ports}}' \
                | awk '$2 ~ /^act-/ && $0 ~ /->5432\/tcp/ { print $1; exit }'
              )"
            fi
            if [[ -n "$pg_id" ]] && command -v docker >/dev/null 2>&1; then
              mapped="$(docker port "$pg_id" 5432/tcp 2>/dev/null | head -n1)"
              if [[ "$mapped" == *:* ]]; then
                pg_port="${mapped##*:}"
              fi
            fi
            for host in host.docker.internal 127.0.0.1 localhost; do
              if (echo >"/dev/tcp/${host}/${pg_port}") >/dev/null 2>&1; then
                pg_host="$host"
                break
              fi
            done
          fi
          if [[ -z "$pg_port" ]]; then
            pg_port="5432"
          fi
          echo "url=host=${pg_host} port=${pg_port} user=postgres password=postgres dbname=drizzle_test" >> "$GITHUB_OUTPUT"

      - name: Restore runner baseline
        if: ${{ !env.ACT }}
        uses: actions/cache/restore@v5
        with:
          path: bench-out/postgres-linux/runs
          key: runner-baseline-postgres-linux-
          restore-keys: |
            runner-baseline-postgres-linux-

      - name: Run contract runner
        id: runner
        shell: bash
        env:
          DATABASE_URL: ${{ steps.pgurl.outputs.url }}
        run: |
          class="full"
          workload="bench/spec/workload.throughput.v1.json"
          if [[ "${BENCHMARK_SIZE}" == "preview" && "${PUBLISH_TO_R2}" != "true" ]]; then
            class="small"
            workload="bench/spec/workload.preview.v1.json"
          elif [[ "${PUBLISH_TO_R2}" == "true" ]]; then
            class="publish"
          fi

          out="bench-out/postgres-linux"
          mkdir -p "$out"

          cargo run --release -p bench-runner -- run \
            --suite throughput-http \
            --workload "$workload" \
            --targets bench/spec/targets.postgres.v1.json \
            --requests bench/spec/requests.empty.v1.json \
            --out "$out" \
            --cohort-id "$BENCH_COHORT_ID" \
            --class "$class" \
            --baseline auto \
            --json | tee runner_output.txt

          run_id="$(grep '^run_id=' runner_output.txt | tail -n1 | cut -d= -f2)"
          if [[ -z "$run_id" ]]; then
            echo "run_id was not emitted"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Validate runner artifacts
        shell: bash
        run: |
          workload="bench/spec/workload.throughput.v1.json"
          if [[ "${BENCHMARK_SIZE}" == "preview" && "${PUBLISH_TO_R2}" != "true" ]]; then
            workload="bench/spec/workload.preview.v1.json"
          fi
          cargo run -q -p bench-runner -- validate \
            --run "bench-out/postgres-linux/runs/${{ steps.runner.outputs.run_id }}" \
            --workload "$workload" \
            --targets bench/spec/targets.postgres.v1.json

      - name: Upload runner artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: runner-postgres-linux
          path: |
            bench-out/postgres-linux/runs/${{ steps.runner.outputs.run_id }}
            runner_output.txt
          retention-days: 30

      - name: Save runner baseline
        if: ${{ env.PUBLISH_TO_R2 == 'true' && !env.ACT }}
        uses: actions/cache/save@v5
        with:
          path: bench-out/postgres-linux/runs/${{ steps.runner.outputs.run_id }}
          key: runner-baseline-postgres-linux-${{ github.sha }}

  postgres-rust-orms:
