  spacetimedb:
    name: SpacetimeDB (linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SpacetimeDB CLI
        shell: bash
        run: |
          curl -fsSL https://install.spacetimedb.com | bash -s -- -y
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Rust dependencies
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: runner-spacetimedb
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Start SpacetimeDB
        shell: bash
        run: |
          rm -rf "$HOME/.local/share/spacetime/data" "$HOME/.config/spacetime"
          pkill -f spacetimedb-standalone 2>/dev/null || true
          sleep 1
          spacetime start --listen-addr 127.0.0.1:3000 --pg-port 5433 &
          for i in $(seq 1 30); do
            if spacetime server ping 2>/dev/null; then
              echo "SpacetimeDB WebSocket ready"
              break
            fi
            sleep 1
          done
          for i in $(seq 1 15); do
            if (echo > /dev/tcp/127.0.0.1/5433) 2>/dev/null; then
              echo "SpacetimeDB PGWire ready on :5433"
              break
            fi
            sleep 1
          done

      - name: Build and publish SpacetimeDB module
        shell: bash
        run: |
          spacetime build -p bench/targets/spacetime-module
          spacetime publish bench-module -p bench/targets/spacetime-module --server http://127.0.0.1:3000

      - name: Generate SpacetimeDB client bindings
        shell: bash
        run: |
          mkdir -p bench/targets/spacetime-native-rs/src/module_bindings
          spacetime generate --lang rust \
            --out-dir bench/targets/spacetime-native-rs/src/module_bindings \
            -p bench/targets/spacetime-module

          mkdir -p bench/targets/spacetime-native-ts/module_bindings
          spacetime generate --lang typescript \
            --out-dir bench/targets/spacetime-native-ts/module_bindings \
            -p bench/targets/spacetime-module

      - name: Install TS target dependencies
        shell: bash
        run: |
          cd bench/targets/spacetime-native-ts && bun install

      - name: Restore runner baseline
        if: ${{ !env.ACT }}
        uses: actions/cache/restore@v4
        with:
          path: bench-out/spacetimedb-linux/runs
          key: runner-baseline-spacetimedb-linux-
          restore-keys: |
            runner-baseline-spacetimedb-linux-

      - name: Extract SpacetimeDB identity token
        id: spacetime-token
        shell: bash
        run: |
          config="$HOME/.config/spacetime/cli.toml"
          if [[ ! -f "$config" ]]; then
            echo "WARNING: $config not found"
            exit 0
          fi
          token=$(sed -n 's/^[[:space:]]*spacetimedb_token[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' "$config" | head -n1)
          if [[ -z "$token" ]]; then
            echo "WARNING: No token found in $config"
            cat "$config"
            exit 0
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run contract runner
        id: runner
        shell: bash
        env:
          SPACETIME_URI: "ws://127.0.0.1:3000"
          SPACETIME_MODULE: "bench-module"
          SPACETIME_TOKEN: ${{ steps.spacetime-token.outputs.token }}
        run: |
          class="small"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            class="publish"
          fi

          out="bench-out/spacetimedb-linux"
          mkdir -p "$out"

          cargo run -p bench-runner -- run \
            --suite throughput-http \
            --workload bench/spec/workload.throughput.v1.json \
            --targets bench/spec/targets.spacetimedb.v1.json \
            --requests bench/spec/requests.empty.v1.json \
            --out "$out" \
            --class "$class" \
            --baseline auto \
            --json | tee runner_output.txt

          run_id="$(grep '^run_id=' runner_output.txt | tail -n1 | cut -d= -f2)"
          if [[ -z "$run_id" ]]; then
            echo "run_id was not emitted"
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Validate runner artifacts
        shell: bash
        run: |
          cargo run -q -p bench-runner -- validate \
            --run "bench-out/spacetimedb-linux/runs/${{ steps.runner.outputs.run_id }}" \
            --workload bench/spec/workload.throughput.v1.json \
            --targets bench/spec/targets.spacetimedb.v1.json

      - name: Upload runner artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: runner-spacetimedb-linux
          path: |
            bench-out/spacetimedb-linux/runs/${{ steps.runner.outputs.run_id }}
            runner_output.txt
          retention-days: 30

      - name: Save runner baseline
        if: ${{ github.ref == 'refs/heads/main' && !env.ACT }}
        uses: actions/cache/save@v4
        with:
          path: bench-out/spacetimedb-linux/runs/${{ steps.runner.outputs.run_id }}
          key: runner-baseline-spacetimedb-linux-${{ github.sha }}

      - name: Publish to R2
        if: ${{ github.ref == 'refs/heads/main' && !env.ACT }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "No R2 credentials, skipping publish"
            exit 0
          fi
          run_id="${{ steps.runner.outputs.run_id }}"
          run_dir="bench-out/spacetimedb-linux/runs/$run_id"

          find "$run_dir" -type f | while read -r file; do
            key="runs/$run_id/${file#$run_dir/}"
            npx wrangler r2 object put "$R2_BUCKET/$key" --file "$file"
          done

          npx wrangler r2 object get "$R2_BUCKET/index.json" --file /tmp/index.json 2>/dev/null \
            || echo '{"version":"v1","runs":[]}' > /tmp/index.json
          cargo run -q -p bench-runner -- publish \
            --run "$run_dir" \
            --index /tmp/index.json
          npx wrangler r2 object put "$R2_BUCKET/index.json" --file /tmp/index.json

