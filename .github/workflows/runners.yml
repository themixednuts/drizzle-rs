        uses: actions/cache/save@v5
        with:
          path: bench-out/postgres-rust-orms-linux/runs/${{ steps.runner.outputs.run_id }}
          key: runner-baseline-postgres-rust-orms-linux-${{ github.sha }}

  postgres-ts:
    name: PostgreSQL TS (linux)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drizzle_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true
          package-manager-cache: false

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Rust dependencies
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: runner-postgres-ts
          save-if: ${{ env.PUBLISH_TO_R2 == 'true' }}

      - name: Install TS target dependencies
        shell: bash
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/drizzle_test"
        run: |
          cd bench/targets/drizzle-ts-pg && bun install
          cd ../prisma-pg && bun install && bunx prisma generate
          cd ../bun-sql-pg && bun install

      - name: Resolve DATABASE_URL
        id: pgurl
        shell: bash
        run: |
          pg_host="localhost"
          pg_port="${{ job.services.postgres.ports[5432] }}"
