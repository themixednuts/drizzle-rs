            --workload "$workload" \
            --targets bench/spec/targets.postgres-rust-orms.v1.json

      - name: Upload runner artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: runner-postgres-rust-orms-linux
          path: |
