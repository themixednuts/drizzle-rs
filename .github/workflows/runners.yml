            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Validate runner artifacts
        shell: bash
        run: |
          workload="bench/spec/workload.throughput.v1.json"
          if [[ "${BENCHMARK_SIZE}" == "preview" && "${PUBLISH_TO_R2}" != "true" ]]; then
            workload="bench/spec/workload.preview.v1.json"
          fi
          cargo run -q -p bench-runner -- validate \
